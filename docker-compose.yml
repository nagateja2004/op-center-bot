services:
  opcenter-chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./indexes:/app/indexes
      - ./manuals:/app/manuals
      - huggingface_cache:/app/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  huggingface_cache:
